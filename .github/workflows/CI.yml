name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1'
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
        arch:
          - x64
    steps:
      - name: Checkout MatrixProjectionModels.jl
        uses: actions/checkout@v4
        with:
          path: MatrixProjectionModels.jl
      - name: Checkout StructuredPopulationCore.jl
        uses: actions/checkout@v4
        with:
          repository: ecorecipes/StructuredPopulationCore.jl
          path: StructuredPopulationCore.jl
      - name: Checkout PhysiologicallyBasedDemographicModels.jl
        uses: actions/checkout@v4
        with:
          repository: ecorecipes/PhysiologicallyBasedDemographicModels.jl
          path: PhysiologicallyBasedDemographicModels.jl
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
        with:
          cache-compiled: 'true'
      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: MatrixProjectionModels.jl
      - uses: julia-actions/julia-runtest@v1
        with:
          project: MatrixProjectionModels.jl
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - name: Checkout MatrixProjectionModels.jl
        uses: actions/checkout@v4
        with:
          path: MatrixProjectionModels.jl
      - name: Checkout StructuredPopulationCore.jl
        uses: actions/checkout@v4
        with:
          repository: ecorecipes/StructuredPopulationCore.jl
          path: StructuredPopulationCore.jl
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
        with:
          cache-compiled: 'true'
      - name: Install dependencies
        run: |
          julia --project=MatrixProjectionModels.jl/docs -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="StructuredPopulationCore.jl"),
              PackageSpec(path="MatrixProjectionModels.jl"),
            ])
            Pkg.instantiate()'
      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=MatrixProjectionModels.jl/docs MatrixProjectionModels.jl/docs/make.jl
